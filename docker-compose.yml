services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    environment:
      POSTGRES_PASSWORD: "localdev"
      POSTGRES_USER: "vespa"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
  db18:
    build:
      context: .
      dockerfile: Dockerfile.postgres18
    environment:
      POSTGRES_PASSWORD: "localdev"
      POSTGRES_USER: "vespa"
    volumes:
      - ./postgres_data18:/var/lib/postgresql
  rabbitmq:
    image: rabbitmq:4.2
    environment:
      RABBITMQ_DEFAULT_VHOST: "vespa"
  app:
    build:
      context: .
    volumes:
      - ./:/usr/src/app
      - /Users/adam/Documents/Archive/PhD/superwasp-data:/opt/vespa/import
    ports:
      - "8080:8080"
    env_file:
      - ./local.env
  celery:
    build:
      context: .
    volumes:
      - ./:/usr/src/app
      - /Users/adam/Documents/Archive/PhD/superwasp-data:/opt/vespa/import
    env_file:
      - ./local.env
    command: bash ./start_worker.sh
